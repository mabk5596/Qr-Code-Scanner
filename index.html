<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Pro - Custom Blue</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

    <style>
        .ui-widget { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .ui-widget-header { border: 1px solid #1d4b86; background: #1d4b86; color: #ffffff; font-weight: bold; padding: 12px; text-align: center; border-radius: 4px 4px 0 0;}
        .ui-widget-content { border: 1px solid #dddddd; background: #ffffff; color: #333333; border-radius: 4px; }
        
        .ui-state-default { 
            border: 1px solid #14355f; 
            background: #1d4b86; 
            font-weight: bold; 
            color: #ffffff;
            padding: 12px 24px; 
            cursor: pointer;
            border-radius: 4px;
            transition: 0.2s;
        }

        .ui-state-hover { background: #2b69ba; }

        #main-container { max-width: 900px; margin: 20px auto; padding: 0; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        #reader { width: 100%; border: none; background: #000; }
        
        /* Table Styling */
        .table-container { padding: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f8f9fa; color: #1d4b86; border: 1px solid #dee2e6; padding: 12px; text-align: left; }
        td { border: 1px solid #dee2e6; padding: 12px; font-size: 14px; vertical-align: top; }
        tr:nth-child(even) { background-color: #fcfcfc; }

        /* Controls */
        .controls { display: flex; flex-wrap: wrap; gap: 15px; padding: 20px; align-items: center; justify-content: center; background: #f1f4f8; }
        
        /* Toggle Switch */
        .switch-wrapper { display: flex; align-items: center; gap: 10px; font-size: 0.9em; font-weight: bold; color: #1d4b86; }
        .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 22px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #1d4b86; }
        input:checked + .slider:before { transform: translateX(22px); }

        #status-msg { text-align: center; color: #1d4b86; font-weight: bold; height: 20px; margin-bottom: 5px; font-size: 0.85em; }
    </style>
</head>
<body class="ui-widget">

    <div id="main-container" class="ui-widget-content">
        <div class="ui-widget-header">BARCODE & QR DATA EXTRACTOR</div>

        <!-- Scanner -->
        <div id="reader"></div>
        
        <div class="controls">
            <div class="switch-wrapper">
                <span>Grab Web Data (Titles)</span>
                <label class="switch">
                    <input type="checkbox" id="dataGrabToggle">
                    <span class="slider"></span>
                </label>
            </div>

            <button class="ui-state-default" onclick="exportToExcel()">Download Excel</button>
            <button class="ui-state-default" onclick="clearData()" style="background: #e9ecef; color: #333; border-color: #ccc;">Clear All</button>
        </div>

        <div id="status-msg">Ready to scan</div>

        <div class="table-container">
            <table id="resultTable">
                <thead>
                    <tr>
                        <th style="width: 30%;">Scanned Value</th>
                        <th style="width: 45%;">Extracted Info (Web Title)</th>
                        <th style="width: 25%;">Timestamp</th>
                    </tr>
                </thead>
                <tbody id="scannedList">
                    <!-- Data rows injected here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let scannedData = [];
        let isPaused = false; // For cooldown

        // 1. SOUND LOGIC
        function playTone(freq = 880, duration = 0.15) {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
            osc.stop(audioCtx.currentTime + duration);
        }

        // 2. DATA GRAB LOGIC (Using a Proxy to fix CORS)
        async function fetchWebTitle(url) {
            if (!url.startsWith('http')) return "Not a valid URL";
            
            try {
                // We use allorigins.win as a proxy to get around CORS blocks
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error('Proxy error');
                
                const data = await response.json();
                const html = data.contents;
                
                // Extract Title using Regex
                const match = html.match(/<title[^>]*>([\s\S]*?)<\/title>/i);
                return match ? match[1].trim() : "No Title Found on Page";
            } catch (err) {
                return "Access Restricted or Page Unavailable";
            }
        }

        // 3. SCANNER LOGIC
        const html5QrCode = new Html5QrcodeScanner("reader", { 
            fps: 10, 
            qrbox: { width: 250, height: 250 },
            aspectRatio: 1.0
        });

        async function onScanSuccess(decodedText) {
            if (isPaused) return;

            // CHECK FOR DUPLICATES
            const isDuplicate = scannedData.some(item => item.Value === decodedText);
            if (isDuplicate) {
                document.getElementById('status-msg').innerText = "⚠️ Duplicate detected - Ignoring";
                playTone(220, 0.3); // Lower warning tone
                return;
            }

            // START COOLDOWN
            isPaused = true;
            document.getElementById('status-msg').innerText = "⌛ Processing...";
            playTone(880, 0.1); // High success tone

            const now = new Date();
            const timestamp = now.toLocaleDateString() + " " + now.toLocaleTimeString();
            const grabEnabled = document.getElementById('dataGrabToggle').checked;
            
            let extractedInfo = "N/A (Toggle Off)";

            // Add to internal array
            const newEntry = { 
                Value: decodedText, 
                ExtractedInfo: "Loading...", 
                Timestamp: timestamp 
            };
            scannedData.unshift(newEntry);
            renderTable();

            // Fetch Web Data if enabled
            if (grabEnabled && decodedText.startsWith('http')) {
                extractedInfo = await fetchWebTitle(decodedText);
                newEntry.ExtractedInfo = extractedInfo;
                renderTable(); // Re-render with new data
            } else {
                newEntry.ExtractedInfo = grabEnabled ? "Not a Link" : "Grab Disabled";
                renderTable();
            }

            // End Cooldown after 3 seconds
            setTimeout(() => {
                isPaused = false;
                document.getElementById('status-msg').innerText = "Ready to scan";
            }, 3000);
        }

        // 4. UI RENDERING
        function renderTable() {
            const tbody = document.getElementById('scannedList');
            tbody.innerHTML = ""; // Clear existing

            scannedData.forEach(item => {
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td>${item.Value}</td>
                    <td><small>${item.ExtractedInfo}</small></td>
                    <td>${item.Timestamp}</td>
                `;
            });
        }

        // 5. EXPORT & UTILS
        function exportToExcel() {
            if (scannedData.length === 0) return alert("No data!");
            const worksheet = XLSX.utils.json_to_sheet(scannedData);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Scans");
            XLSX.writeFile(workbook, "Scanned_Data.xlsx");
        }

        function clearData() {
            if(confirm("Delete all list data?")) {
                scannedData = [];
                renderTable();
            }
        }

        html5QrCode.render(onScanSuccess);
    </script>
</body>
</html>
