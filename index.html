<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner to Excel - Custom Blue</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

    <style>
        .ui-helper-hidden { display: none; }
        .ui-widget { font-family: Trebuchet MS, Tahoma, Verdana, Arial, sans-serif; font-size: 1.1em; }
        .ui-widget-content { border: 1px solid #dddddd; background: #eeeeee; color: #333333; }
        .ui-widget-header { border: 1px solid #1d4b86; background: #1d4b86; color: #ffffff; font-weight: bold; padding: 12px; text-align: center;}
        .ui-corner-all { border-radius: 4px; }
        
        .ui-state-default { 
            border: 1px solid #14355f; 
            background: #1d4b86; 
            font-weight: bold; 
            color: #ffffff;
            padding: 10px 20px; 
            cursor: pointer;
            transition: background 0.2s;
        }

        .ui-state-hover { 
            border: 1px solid #1d4b86; 
            background: #2b69ba; 
            color: #ffffff;
        }

        #main-container { max-width: 800px; margin: 20px auto; padding: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        #reader { width: 100%; margin-bottom: 20px; border: 1px solid #ddd; overflow: hidden; border-radius: 4px; background: #000; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; font-size: 0.8em; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        .button-set { margin: 20px 0; text-align: center; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; align-items: center; }
        
        /* Toggle Switch Styling */
        .switch { position: relative; display: inline-block; width: 50px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #1d4b86; }
        input:checked + .slider:before { transform: translateX(26px); }
        .toggle-label { font-size: 0.9em; font-weight: bold; color: #1d4b86; }

        #error-msg { color: #cd0a0a; font-size: 0.8em; text-align: center; margin-top: 10px; }
    </style>
</head>
<body class="ui-widget">

    <div id="main-container" class="ui-widget-content ui-corner-all">
        <div class="ui-widget-header ui-corner-all">
            BARCODE & QR SCANNER
        </div>

        <div style="padding: 20px;">
            <div id="reader"></div>
            <div id="error-msg"></div>

            <div class="button-set">
                <!-- Toggle for Data Grab -->
                <div style="display: flex; align-items: center; gap: 10px; margin-right: 20px;">
                    <span class="toggle-label">Internal Data Grab:</span>
                    <label class="switch">
                        <input type="checkbox" id="dataGrabToggle">
                        <span class="slider"></span>
                    </label>
                </div>

                <button id="exportBtn" class="ui-state-default ui-corner-all" onclick="exportToExcel()">
                    Download Excel
                </button>
                <button class="ui-state-default ui-corner-all" onclick="clearData()" style="background: #f6f6f6; color: #1d4b86; border: 1px solid #ccc;">
                    Clear List
                </button>
            </div>

            <table id="resultTable">
                <thead>
                    <tr class="ui-widget-header" style="background: #555; border: 1px solid #444;">
                        <th>Value</th>
                        <th>Extracted Info</th>
                        <th>Timestamp</th>
                    </tr>
                </thead>
                <tbody id="scannedList"></tbody>
            </table>
        </div>
    </div>

    <script>
        const scannedData = [];
        let isScanning = false;

        // 1. Audio Logic (Beep)
        function playSuccessTone() {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); // A5 note
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            
            oscillator.start();
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.2);
            oscillator.stop(audioCtx.currentTime + 0.2);
        }

        // 2. Data Grab Logic
        async function fetchPageData(url) {
            if (!url.startsWith('http')) return "Not a link";
            
            try {
                // We use a timeout to prevent the app from hanging
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 5000);

                const response = await fetch(url, { signal: controller.signal });
                const text = await response.text();
                
                // Parse HTML to find title
                const doc = new DOMParser().parseFromString(text, "text/html");
                const title = doc.querySelector('title')?.innerText || "No Title Found";
                return title.trim();
            } catch (err) {
                console.error(err);
                return "CORS Blocked / Request Error";
            }
        }

        // 3. Initialize Scanner
        const html5QrCode = new Html5QrcodeScanner("reader", { 
            fps: 10, 
            qrbox: { width: 250, height: 250 },
            aspectRatio: 1.0
        });

        async function onScanSuccess(decodedText, decodedResult) {
            // Prevent duplicate scans within 3 seconds
            const lastScan = scannedData[scannedData.length - 1];
            if (lastScan && lastScan.Value === decodedText && (Date.now() - lastScan.rawTime < 3000)) return;

            playSuccessTone();
            
            const now = new Date();
            const timestamp = now.toLocaleDateString() + " " + now.toLocaleTimeString();
            const grabEnabled = document.getElementById('dataGrabToggle').checked;
            
            let extractedInfo = "N/A";
            
            // UI Feedback: Insert row immediately
            const tbody = document.getElementById('scannedList');
            const row = tbody.insertRow(0);
            row.innerHTML = `<td>${decodedText}</td><td id="info-${scannedData.length}">Scanning...</td><td>${timestamp}</td>`;

            if (grabEnabled && decodedText.startsWith('http')) {
                extractedInfo = await fetchPageData(decodedText);
                document.getElementById(`info-${scannedData.length}`).innerText = extractedInfo;
            } else {
                extractedInfo = "Grab Disabled/Not URL";
                document.getElementById(`info-${scannedData.length}`).innerText = extractedInfo;
            }

            scannedData.push({ 
                Value: decodedText, 
                ExtractedInfo: extractedInfo, 
                Timestamp: timestamp,
                rawTime: Date.now() 
            });
        }

        function onScanFailure(error) {
            if (error.includes("NotAllowedError")) {
                document.getElementById('error-msg').innerText = "Camera access denied.";
            }
        }

        html5QrCode.render(onScanSuccess, onScanFailure);

        // 4. Export Functionality
        function exportToExcel() {
            if (scannedData.length === 0) {
                alert("No data to export.");
                return;
            }
            // Clean data for export (remove rawTime)
            const exportArray = scannedData.map(({Value, ExtractedInfo, Timestamp}) => ({Value, ExtractedInfo, Timestamp}));
            
            const worksheet = XLSX.utils.json_to_sheet(exportArray);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Scans");
            XLSX.writeFile(workbook, "Scanned_Data.xlsx");
        }

        function clearData() {
            if(confirm("Clear all scanned data?")) {
                scannedData.length = 0;
                document.getElementById('scannedList').innerHTML = "";
            }
        }

        // Hover effects
        document.querySelectorAll('.ui-state-default').forEach(btn => {
            btn.addEventListener('mouseenter', () => btn.classList.add('ui-state-hover'));
            btn.addEventListener('mouseleave', () => btn.classList.remove('ui-state-hover'));
        });
    </script>
</body>
</html>
