<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Pro - Custom Blue</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

    <style>
        .ui-widget { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .ui-widget-header { border: 1px solid #1d4b86; background: #1d4b86; color: #ffffff; font-weight: bold; padding: 12px; text-align: center; border-radius: 4px 4px 0 0;}
        .ui-widget-content { border: 1px solid #dddddd; background: #ffffff; color: #333333; border-radius: 4px; }
        
        .ui-state-default { 
            border: 1px solid #14355f; 
            background: #1d4b86; 
            font-weight: bold; 
            color: #ffffff;
            padding: 12px 24px; 
            cursor: pointer;
            border-radius: 4px;
            transition: 0.2s;
        }

        .ui-state-hover { background: #2b69ba; }

        #main-container { max-width: 900px; margin: 20px auto; padding: 0; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        #reader { width: 100%; border: none; background: #000; }
        
        /* Table Styling */
        .table-container { padding: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f8f9fa; color: #1d4b86; border: 1px solid #dee2e6; padding: 12px; text-align: left; }
        td { border: 1px solid #dee2e6; padding: 12px; font-size: 14px; vertical-align: top; }
        tr:nth-child(even) { background-color: #fcfcfc; }

        /* Controls */
        .controls { display: flex; flex-wrap: wrap; gap: 15px; padding: 20px; align-items: center; justify-content: center; background: #f1f4f8; }
        
        /* Toggle Switch */
        .switch-wrapper { display: flex; align-items: center; gap: 10px; font-size: 0.9em; font-weight: bold; color: #1d4b86; }
        .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 22px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #1d4b86; }
        input:checked + .slider:before { transform: translateX(22px); }

        #status-msg { text-align: center; color: #1d4b86; font-weight: bold; height: 20px; margin-bottom: 5px; font-size: 0.85em; }
    </style>
</head>
<body class="ui-widget">

    <div id="main-container" class="ui-widget-content">
        <div class="ui-widget-header">BARCODE & QR DATA EXTRACTOR</div>

        <!-- Scanner -->
        <div id="reader"></div>
        
        <div class="controls">
            <div class="switch-wrapper">
                <span>Grab Web Data (Titles)</span>
                <label class="switch">
                    <input type="checkbox" id="dataGrabToggle">
                    <span class="slider"></span>
                </label>
            </div>

            <button class="ui-state-default" onclick="exportToExcel()">Download Excel</button>
            <button class="ui-state-default" onclick="clearData()" style="background: #e9ecef; color: #333; border-color: #ccc;">Clear All</button>
        </div>

        <div id="status-msg">Ready to scan</div>

        <div class="table-container">
            <table id="resultTable">
                <thead>
                    <tr>
                        <th style="width: 30%;">Scanned Value</th>
                        <th style="width: 45%;">Extracted Info (Web Title)</th>
                        <th style="width: 25%;">Timestamp</th>
                    </tr>
                </thead>
                <tbody id="scannedList">
                    <!-- Data rows injected here -->
                </tbody>
            </table>
        </div>
    </div>

    
       <script>
        const scannedData = [];
        
        // 1. Audio Logic
        function playSuccessTone() {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            oscillator.start();
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.2);
            oscillator.stop(audioCtx.currentTime + 0.2);
        }

        // 2. Optimized Data Grab (Non-blocking)
        async function fetchPageData(url, rowIndex) {
            const cellId = `info-cell-${rowIndex}`;
            const targetCell = document.getElementById(cellId);

            try {
                // Using a different proxy as backup
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
                
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000); // 10s timeout

                const response = await fetch(proxyUrl, { signal: controller.signal });
                const data = await response.json();
                
                if (data.contents) {
                    const doc = new DOMParser().parseFromString(data.contents, "text/html");
                    // Try to find Haj specific data or Page Title
                    const title = doc.querySelector('title')?.innerText || "No Title";
                    const result = title.replace("::", "").trim();
                    
                    // Update UI and Array
                    targetCell.innerText = result;
                    scannedData[rowIndex].ExtractedInfo = result;
                } else {
                    throw new Error("Empty response");
                }
            } catch (err) {
                targetCell.innerText = "CORS/Private Link";
                scannedData[rowIndex].ExtractedInfo = "Access Denied";
            }
        }

        // 3. Initialize Scanner
        const html5QrCode = new Html5QrcodeScanner("reader", { 
            fps: 10, 
            qrbox: { width: 250, height: 250 },
            rememberLastUsedCamera: true
        });

        function onScanSuccess(decodedText, decodedResult) {
            // Prevent duplicate scans within 5 seconds
            const nowTime = Date.now();
            const lastScan = scannedData[0]; // Check the most recent scan
            if (lastScan && lastScan.Value === decodedText && (nowTime - lastScan.rawTime < 5000)) {
                return; 
            }

            playSuccessTone();
            
            const now = new Date();
            const timestamp = now.toLocaleDateString() + " " + now.toLocaleTimeString();
            const grabEnabled = document.getElementById('dataGrabToggle').checked;
            
            // Create a record object
            const newEntry = {
                Value: decodedText,
                ExtractedInfo: "Waiting...",
                Timestamp: timestamp,
                rawTime: nowTime
            };

            // Add to start of array
            scannedData.unshift(newEntry);
            const currentIndex = 0; // It's at the top

            // Update UI Table immediately
            const tbody = document.getElementById('scannedList');
            const row = tbody.insertRow(0);
            row.innerHTML = `
                <td style="word-break: break-all; max-width: 200px;">${decodedText}</td>
                <td id="info-cell-0">---</td>
                <td>${timestamp}</td>
            `;

            // Update all IDs of existing rows to match their new index
            Array.from(tbody.rows).forEach((r, i) => {
                const infoCell = r.cells[1];
                infoCell.id = `info-cell-${i}`;
            });

            // Trigger data fetch in background (DO NOT 'AWAIT' HERE)
            if (grabEnabled && decodedText.startsWith('http')) {
                document.getElementById(`info-cell-0`).innerText = "Fetching...";
                fetchPageData(decodedText, 0);
            } else {
                const msg = grabEnabled ? "Not a URL" : "Grab Disabled";
                document.getElementById(`info-cell-0`).innerText = msg;
                scannedData[0].ExtractedInfo = msg;
            }
        }

        html5QrCode.render(onScanSuccess);

        // 4. Export & Clear
        function exportToExcel() {
            if (scannedData.length === 0) {
                alert("No data to export.");
                return;
            }
            const exportArray = scannedData.map(({Value, ExtractedInfo, Timestamp}) => ({Value, ExtractedInfo, Timestamp}));
            const worksheet = XLSX.utils.json_to_sheet(exportArray);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Scans");
            XLSX.writeFile(workbook, "Scanned_Data.xlsx");
        }

        function clearData() {
            if(confirm("Clear all scanned data?")) {
                scannedData.length = 0;
                document.getElementById('scannedList').innerHTML = "";
            }
        }
    </script>
</body>
</html>
